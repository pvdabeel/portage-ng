let currentType = "rdepend";
let collapsed = new Set();

let zoom = 1;
let isPanning = false, panStart = {x:0,y:0}, vbStart = {x:0,y:0};

const CARD_W = 130, CARD_H = 44, LAYER_H = 90, MIN_GAP = 16;
const svg = document.getElementById("graph-svg");
const container = document.getElementById("graph-container");
const tooltip = document.getElementById("tooltip");
const ns = "http://www.w3.org/2000/svg";

function getTree() { return treeData[currentType]; }

function buildLayout() {
  const tree = getTree();
  if (!tree) return {positions:{}, maxX:0, maxY:0};
  const childMap = {}, nodeMap = {};
  tree.nodes.forEach(n => { nodeMap[n.id] = n; childMap[n.id] = []; });
  tree.edges.forEach(e => { if (childMap[e.from]) childMap[e.from].push(e.to); });

  const hiddenSet = new Set();
  function markHidden(id) {
    (childMap[id]||[]).forEach(c => { hiddenSet.add(c); markHidden(c); });
  }
  collapsed.forEach(id => markHidden(id));

  const layers = {};
  const visited = new Set();
  function bfs(startId) {
    const queue = [{id: startId, depth: 0}];
    visited.add(startId);
    while (queue.length) {
      const {id, depth} = queue.shift();
      if (!layers[depth]) layers[depth] = [];
      layers[depth].push(id);
      (childMap[id]||[]).forEach(c => {
        if (!visited.has(c) && !hiddenSet.has(c)) { visited.add(c); queue.push({id:c, depth:depth+1}); }
      });
    }
  }
  bfs(tree.root);

  const positions = {};
  const maxDepth = Math.max(...Object.keys(layers).map(Number));
  const layerWidths = {};
  for (let d = maxDepth; d >= 0; d--) {
    const ids = layers[d] || [];
    const totalW = ids.length * CARD_W + (ids.length - 1) * MIN_GAP;
    layerWidths[d] = totalW;
  }
  const maxW = Math.max(...Object.values(layerWidths), 400);

  for (let d = maxDepth; d >= 0; d--) {
    const ids = layers[d] || [];
    if (ids.length === 0) continue;
    ids.forEach((id, i) => {
      const children = (childMap[id]||[]).filter(c => !hiddenSet.has(c) && positions[c]);
      let x;
      if (children.length > 0) {
        const cx = children.reduce((s, c) => s + positions[c].x, 0) / children.length;
        x = cx;
      } else {
        const totalW = ids.length * CARD_W + (ids.length - 1) * MIN_GAP;
        const startX = (maxW - totalW) / 2;
        x = startX + i * (CARD_W + MIN_GAP) + CARD_W / 2;
      }
      positions[id] = {x, y: d * LAYER_H + 30};
    });

    resolveOverlaps(layers[d], positions);
  }

  for (let d = 0; d <= maxDepth; d++) {
    const ids = layers[d] || [];
    ids.forEach(id => {
      const children = (childMap[id]||[]).filter(c => !hiddenSet.has(c) && positions[c]);
      if (children.length > 0) {
        const cx = children.reduce((s, c) => s + positions[c].x, 0) / children.length;
        positions[id].x = cx;
      }
    });
    resolveOverlaps(layers[d], positions);
  }

  return {positions, maxX: maxW, maxY: (maxDepth + 1) * LAYER_H + 40, hiddenSet, childMap, nodeMap};
}

function resolveOverlaps(ids, positions) {
  if (!ids || ids.length <= 1) return;
  ids.sort((a, b) => positions[a].x - positions[b].x);
  for (let i = 1; i < ids.length; i++) {
    const prev = positions[ids[i-1]], curr = positions[ids[i]];
    const minX = prev.x + CARD_W + MIN_GAP;
    if (curr.x < minX) curr.x = minX;
  }
}

function render() {
  const tree = getTree();
  if (!tree) { svg.innerHTML = ""; return; }
  const {positions, maxX, maxY, hiddenSet, childMap, nodeMap} = buildLayout();

  const pad = 40;
  viewBox = {x: -pad, y: -pad, w: maxX + pad * 2, h: maxY + pad * 2};
  svg.setAttribute("viewBox", `${viewBox.x} ${viewBox.y} ${viewBox.w} ${viewBox.h}`);

  svg.innerHTML = "";

  const defs = document.createElementNS(ns, "defs");
  ["normal","weak","strong"].forEach(t => {
    const col = t === "weak" ? "var(--edge-weak)" : t === "strong" ? "var(--edge-strong)" : "var(--edge-normal)";
    const m = document.createElementNS(ns, "marker");
    m.setAttribute("id", "arrow-" + t); m.setAttribute("markerWidth", "7");
    m.setAttribute("markerHeight", "5"); m.setAttribute("refX", "7");
    m.setAttribute("refY", "2.5"); m.setAttribute("orient", "auto");
    const p = document.createElementNS(ns, "polygon");
    p.setAttribute("points", "0 0,7 2.5,0 5"); p.setAttribute("fill", col);
    m.appendChild(p); defs.appendChild(m);
  });
  svg.appendChild(defs);

  const edgeG = document.createElementNS(ns, "g");
  edgeG.setAttribute("class", "edges");
  tree.edges.forEach(e => {
    if (hiddenSet.has(e.to) || !positions[e.from] || !positions[e.to]) return;
    const fp = positions[e.from], tp = positions[e.to];
    const x1 = fp.x, y1 = fp.y + CARD_H / 2;
    const x2 = tp.x, y2 = tp.y - CARD_H / 2;
    const my = (y1 + y2) / 2;
    const path = document.createElementNS(ns, "path");
    path.setAttribute("d", `M${x1},${y1} C${x1},${my} ${x2},${my} ${x2},${y2}`);
    const col = e.type === "weak" ? "var(--edge-weak)" : e.type === "strong" ? "var(--edge-strong)" : "var(--edge-normal)";
    const markerT = e.type === "no" ? "normal" : e.type;
    path.setAttribute("stroke", col); path.setAttribute("stroke-width", "1.3");
    path.setAttribute("fill", "none"); path.setAttribute("marker-end", `url(#arrow-${markerT})`);
    path.setAttribute("opacity", "0.6");
    if (e.type === "weak") path.setAttribute("stroke-dasharray", "5,3");
    if (e.type === "strong") path.setAttribute("stroke-dasharray", "3,2");
    edgeG.appendChild(path);
  });
  svg.appendChild(edgeG);

  const nodeG = document.createElementNS(ns, "g");
  nodeG.setAttribute("class", "nodes");
  tree.nodes.forEach(n => {
    if (hiddenSet.has(n.id) || !positions[n.id]) return;
    const pos = positions[n.id];
    const isRoot = n.id === tree.root;
    const isCollapsed = collapsed.has(n.id);
    const childCount = (childMap[n.id]||[]).length;
    const descendantCount = countDescendants(n.id, childMap);

    const fo = document.createElementNS(ns, "foreignObject");
    fo.setAttribute("x", pos.x - CARD_W / 2);
    fo.setAttribute("y", pos.y - CARD_H / 2);
    fo.setAttribute("width", CARD_W);
    fo.setAttribute("height", CARD_H);

    const card = document.createElement("div");
    let cls = "node-card";
    if (isRoot) cls += " root";
    if (n.installed) cls += " installed";
    if (isCollapsed) cls += " collapsed";
    card.className = cls;
    card.dataset.id = n.id;

    const nameDiv = document.createElement("div");
    nameDiv.className = "pkg-name";
    nameDiv.textContent = n.name;

    const verDiv = document.createElement("div");
    verDiv.className = "pkg-ver";
    verDiv.textContent = n.ver + (n.slot !== "0" ? "  :" + n.slot : "");

    card.appendChild(nameDiv);
    card.appendChild(verDiv);

    if (childCount > 0) {
      const ind = document.createElement("div");
      ind.className = "collapse-indicator";
      ind.textContent = isCollapsed ? "+" + descendantCount : "\u25BE";
      card.appendChild(ind);
    }

    card.addEventListener("click", () => {
      if (childCount === 0) return;
      if (collapsed.has(n.id)) collapsed.delete(n.id);
      else collapsed.add(n.id);
      render();
    });

    card.addEventListener("mouseenter", (ev) => showTooltip(ev, n));
    card.addEventListener("mousemove", (ev) => moveTooltip(ev));
    card.addEventListener("mouseleave", hideTooltip);

    fo.appendChild(card);
    nodeG.appendChild(fo);
  });
  svg.appendChild(nodeG);

  const visibleNodes = tree.nodes.filter(n => !hiddenSet.has(n) && positions[n.id]).length;
  const visibleEdges = tree.edges.filter(e => !hiddenSet.has(e.to) && positions[e.from] && positions[e.to]).length;
  const maxDepth = Math.max(...Object.values(positions).map(p => p.y)) / LAYER_H + 1;
  document.getElementById("subtitle").textContent =
    `${visibleNodes} nodes \u00b7 ${visibleEdges} edges \u00b7 ${Math.round(maxDepth)} levels`;
}

function countDescendants(id, childMap) {
  let count = 0;
  const stack = [...(childMap[id]||[])];
  const seen = new Set();
  while (stack.length) {
    const c = stack.pop();
    if (seen.has(c)) continue;
    seen.add(c); count++;
    (childMap[c]||[]).forEach(cc => stack.push(cc));
  }
  return count;
}

function showTooltip(ev, n) {
  const useHtml = (n.use||[]).map(u => {
    const on = u.startsWith("+");
    const name = u.replace(/^[+-]/, "");
    return `<span class="use-flag ${on?"on":"off"}">${u}</span>`;
  }).join("");

  tooltip.innerHTML = `
    <div class="tt-title">${n.cat}/${n.name}-${n.ver}</div>
    ${n.desc ? `<div class="tt-desc">${n.desc}</div>` : ""}
    <div class="tt-row"><span class="tt-label">Slot</span><span class="tt-value">${n.slot}</span></div>
    <div class="tt-row"><span class="tt-label">Status</span><span class="${n.installed?"tt-installed":"tt-not-installed"}">${n.installed?"Installed":"Not installed"}</span></div>
    ${n.homepage ? `<div class="tt-row"><span class="tt-label">Home</span><a class="tt-link" href="${n.homepage}" target="_blank">${n.homepage.replace(/https?:\/\//,'').substring(0,40)}...</a></div>` : ""}
    ${useHtml ? `<div style="margin-top:4px"><span class="tt-label">USE</span><div class="use-flags">${useHtml}</div></div>` : ""}
  `;
  tooltip.style.display = "block";
  moveTooltip(ev);
}
function moveTooltip(ev) {
  const pad = 12;
  let x = ev.clientX + pad, y = ev.clientY + pad;
  const tw = tooltip.offsetWidth, th = tooltip.offsetHeight;
  if (x + tw > window.innerWidth - pad) x = ev.clientX - tw - pad;
  if (y + th > window.innerHeight - pad) y = ev.clientY - th - pad;
  tooltip.style.left = x + "px"; tooltip.style.top = y + "px";
}
function hideTooltip() { tooltip.style.display = "none"; }

function switchDepType(type, btn) {
  if (!treeData[type]) return;
  currentType = type;
  collapsed.clear();
  document.querySelectorAll(".dep-tab").forEach(b => {
    b.classList.toggle("active", b.dataset.type === type);
    b.classList.toggle("off", b.dataset.type !== type);
  });
  render();
}

function expandAll() { collapsed.clear(); render(); }
function collapseAll() {
  const tree = getTree(); if (!tree) return;
  const childMap = {};
  tree.nodes.forEach(n => childMap[n.id] = []);
  tree.edges.forEach(e => { if (childMap[e.from]) childMap[e.from].push(e.to); });
  tree.nodes.forEach(n => { if ((childMap[n.id]||[]).length > 0 && n.id !== tree.root) collapsed.add(n.id); });
  render();
}

function resetView() {
  zoom = 1;
  document.getElementById("zoom-level").textContent = "100%";
  render();
}
function zoomIn() {
  zoom = Math.min(zoom * 1.25, 4);
  applyZoom();
}
function zoomOut() {
  zoom = Math.max(zoom / 1.25, 0.25);
  applyZoom();
}
function applyZoom() {
  const cx = viewBox.x + viewBox.w / 2, cy = viewBox.y + viewBox.h / 2;
  const nw = viewBox.w / zoom, nh = viewBox.h / zoom;
  svg.setAttribute("viewBox", `${cx - nw/2} ${cy - nh/2} ${nw} ${nh}`);
  document.getElementById("zoom-level").textContent = Math.round(zoom * 100) + "%";
}

container.addEventListener("mousedown", e => {
  if (e.target.closest(".node-card")) return;
  isPanning = true;
  panStart = {x: e.clientX, y: e.clientY};
  const vb = svg.getAttribute("viewBox").split(" ").map(Number);
  vbStart = {x: vb[0], y: vb[1]};
  container.style.cursor = "grabbing";
});
container.addEventListener("mousemove", e => {
  if (!isPanning) return;
  const vb = svg.getAttribute("viewBox").split(" ").map(Number);
  const scale = vb[2] / container.clientWidth;
  const dx = (e.clientX - panStart.x) * scale;
  const dy = (e.clientY - panStart.y) * scale;
  svg.setAttribute("viewBox", `${vbStart.x - dx} ${vbStart.y - dy} ${vb[2]} ${vb[3]}`);
});
container.addEventListener("mouseup", () => { isPanning = false; container.style.cursor = ""; });
container.addEventListener("mouseleave", () => { isPanning = false; container.style.cursor = ""; });
container.addEventListener("wheel", e => {
  e.preventDefault();
  const factor = e.deltaY > 0 ? 0.9 : 1.1;
  zoom *= factor;
  zoom = Math.max(0.25, Math.min(4, zoom));
  const vb = svg.getAttribute("viewBox").split(" ").map(Number);
  const rect = container.getBoundingClientRect();
  const mx = (e.clientX - rect.left) / rect.width;
  const my = (e.clientY - rect.top) / rect.height;
  const nw = vb[2] / factor, nh = vb[3] / factor;
  const nx = vb[0] + (vb[2] - nw) * mx;
  const ny = vb[1] + (vb[3] - nh) * my;
  svg.setAttribute("viewBox", `${nx} ${ny} ${nw} ${nh}`);
  document.getElementById("zoom-level").textContent = Math.round(zoom * 100) + "%";
}, {passive: false});

render();
</script>
</body>
</html>
